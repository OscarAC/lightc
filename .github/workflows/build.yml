name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-debug:
    name: Debug (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc
      - name: Build (debug)
        run: ./configure debug && ninja
      - name: Run tests
        run: ninja test

  build-release:
    name: Release (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc
      - name: Build (release)
        run: ./configure release && ninja

  build-tiny:
    name: Tiny (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build gcc
      - name: Build (tiny)
        run: ./configure tiny && ninja
